<!doctype html>
<html style="background: transparent">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Stream</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html, body {
                background: transparent !important;
                height: 100%;
                overflow: hidden;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            .drag-region {
                -webkit-app-region: drag;
                height: 32px;
                background: rgba(80, 80, 80, 0.4);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 8px;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .drag-region .title {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                color: #cccccc;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-size: 12px;
                font-weight: 600;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            }

            .drag-region .btn-back {
                background: rgba(100, 100, 100, 0.6);
                color: #ccc;
                margin-right: 6px;
                -webkit-app-region: no-drag;
            }

            .drag-region .btn-back svg {
                width: 14px;
                height: 14px;
                fill: currentColor;
            }

            .drag-region .controls {
                display: flex;
                gap: 8px;
                -webkit-app-region: no-drag;
            }

            .drag-region button {
                width: 22px;
                height: 22px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s, transform 0.1s;
            }

            .drag-region button:active {
                transform: scale(0.95);
            }

            .drag-region button:hover {
                filter: brightness(1.2);
            }

            .drag-region .btn-close {
                background: rgba(180, 60, 60, 0.7);
                color: #ddd;
            }

            .drag-region .btn-close:hover {
                background: rgba(220, 60, 60, 0.9);
            }

            .drag-region .btn-minimize {
                background: rgba(100, 100, 100, 0.6);
                color: #888;
            }

            .drag-region .btn-minimize:hover {
                background: rgba(130, 130, 130, 0.7);
                color: #ccc;
            }

            .drag-region .btn-pin {
                background: rgba(100, 100, 100, 0.6);
                color: #888;
            }

            .drag-region .btn-pin.active {
                background: rgba(255, 200, 0, 0.8);
                color: #333;
            }

            .btn-pin svg {
                width: 12px;
                height: 12px;
                fill: currentColor;
            }

            .video-wrapper {
                flex: 1;
                position: relative;
                overflow: hidden;
            }

            .video-wrapper webview {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border: none;
            }

            .text-dark .title {
                color: #222 !important;
                text-shadow: none !important;
            }
        </style>
    </head>
    <body>
        <div class="drag-region" id="dragRegion">
            <button class="btn-back" id="backBtn" title="Volver">
                <svg viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z" fill="currentColor"/>
                </svg>
            </button>
            <span class="title" id="title">Stream</span>
            <div class="controls">
                <button class="btn-pin active" id="pinBtn" title="Siempre visible">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 12V4h-2v4H8l4 8 4-8h-2V4h2v8z"/>
                        <circle cx="12" cy="3" r="2"/>
                    </svg>
                </button>
                <button class="btn-minimize" id="minimizeBtn" title="Minimizar">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 13H5v-2h14v2z"/>
                    </svg>
                </button>
                <button class="btn-close" id="closeBtn" title="Cerrar">×</button>
            </div>
        </div>
        <div class="video-wrapper" id="videoWrapper">
            <webview id="video" partition="persist:twitch-video" allowpopups></webview>
        </div>

        <script>
            const video = document.getElementById("video");
            const pinBtn = document.getElementById("pinBtn");
            const title = document.getElementById("title");
            const backBtn = document.getElementById("backBtn");

            const params = new URLSearchParams(window.location.search);
            const user = params.get("user");

            if (user) {
                title.textContent = `Stream de ${user}`;
                video.src = `https://player.twitch.tv/?channel=${user}&enableExtensions=true&muted=false&parent=twitch.tv&player=popout&quality=1080p30&volume=1`;
            }

            pinBtn.addEventListener("click", () =>
                window.electronAPI.togglePin(),
            );

            document.getElementById("closeBtn").addEventListener("click", () =>
                window.electronAPI.close(),
            );

            document.getElementById("minimizeBtn").addEventListener("click", () =>
                window.electronAPI.minimize(),
            );

            backBtn.addEventListener("click", () => {
                window.electronAPI.closeStreams();
            });

            window.electronAPI.onPinChanged((isOnTop) => {
                pinBtn.classList.toggle("active", isOnTop);
            });
        </script>
    </body>
</html>
